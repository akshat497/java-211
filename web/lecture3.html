      /* positions in css */
      /* static
      sticky
      relative
      fixed
      absolute */
      .pos {
        height: 100px;
        width: 100px;
        border: 2px solid black;
        margin: 5px;
        background-color: red;
      }
      #static {
        top: 30px;
        right: 50px;
      }
      #relative {
        background-color: aqua;
        position: relative;
        top: 80px;
        left: 10px;
      }
      #fixed {
        background-color: green;
        position: fixed;
        bottom: 20px;
        right: 0;
      }
      #sticky {
        background-color: yellowgreen;
        position: sticky;
        bottom: 0;
      }
      .parent {
        height: 500px;
        width: 500px;
        border: 2px solid red;
        position: relative;
      }
      #absolute {
        position: absolute;
        bottom: 0;
        right: 0;
      }
    </style>
  </head>
